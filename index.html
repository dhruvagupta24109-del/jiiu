  .brand{ display:flex; flex-direction:column; line-height:1; }
  .brand-mark{ font-family:'Fraunces',serif; font-size:19px; color:var(--paper); }

  .end-card p{ font-size:13.5px; color:var(--slate); line-height:1.5; margin:0;}

  .related-label{ font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--slate); margin:26px 0 10px;}
  .chips{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px;}

  .offline-tag{ display:flex; align-items:center; gap:6px; margin-top:24px; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--moss); letter-spacing:0.06em;}

  @media (max-width:460px){ .frame{ width:100vw; height:100vh; border-radius:0; padding:0;} .screen{ border-radius:0;} }

  id:'rome-fall', cat:'History', tint:'#b0532c', icon:'helmet',
  q:'Why did Rome fall, when it had roads, law, and a professional army?',
  teaser:'The Western Roman Empire had engineering, bureaucracy, and military doctrine that outclassed its neighbors for centuries — yet it unravelled within a single lifetime. Historians still argue over whether the real cause was economic, military, political, or something else entirely.',
  title:'The fall of Rome has no single cause — and that\'s the real lesson',
  eyebrow:'History · long read',
  body:[
   'Ask ten historians why the Western Roman Empire collapsed in the 5th century, and you will likely get ten overlapping but distinct answers. Edward Gibbon, writing in the 18th century, blamed moral decay and the corrosive rise of Christianity displacing civic virtue — a view almost no serious historian holds today, but one that shaped popular imagination for two hundred years. Modern scholarship has replaced that single-cause story with a tangle of contributing pressures, none of which alone would likely have been fatal.',
   'The economic argument points to currency debasement. Roman emperors, chronically short of silver to pay soldiers and bureaucrats, repeatedly reduced the precious-metal content of coins. By the 3rd century, the denarius held a fraction of its original silver, fueling inflation that eroded trust in Roman money and, with it, trust in Roman institutions. A state that cannot reliably pay its army is a fragile state, and Rome\'s army was its most expensive line item by far.',
   'The military argument focuses on overextension and manpower. At its height, Rome defended a border stretching from Scotland to the Euphrates with a force that, by modern standards, was remarkably small — probably under half a million men for the whole empire. As the empire increasingly relied on Germanic foederati, allied tribes recruited to fight for Rome in exchange for land and pay, the line between "Roman army" and "the same peoples Rome was supposedly defending against" blurred. When those arrangements broke down, as they did with the Visigoths in 410, Rome was fighting former employees who knew its weaknesses intimately.',
   'A third strand is political: the sheer instability of imperial succession. Rome had no reliable, agreed-upon mechanism for transferring power. The 3rd century alone saw over twenty emperors, most dying violently, in what historians call the Crisis of the Third Century. Civil wars pulled legions away from the frontiers to fight each other over the throne, leaving borders exposed at exactly the moments unity was most needed.',
   'Then there is climate and disease, a case historians have only taken seriously in the last few decades thanks to ice-core and tree-ring data. The period around the fall of the West coincided with the Late Antique Little Ice Age, a cooling event linked to volcanic eruptions, which likely reduced agricultural yields across the empire. The Plague of Cyprian in the 3rd century and later outbreaks may have killed a significant share of the population in some regions, thinning the tax base and the army recruitment pool simultaneously.',
   'What makes this genuinely interesting, rather than just a trivia answer, is how these factors interacted. A weaker currency made it harder to pay soldiers, which made emperors more dependent on foederati, which made frontiers less loyal, which made civil wars more costly, which pulled resources from the frontier, which let outside pressure through, which shrank tax revenue further. No single domino was decisive; the compounding was.',
   'It is also worth noting what did not happen: Rome did not fall to a single overwhelming invasion the way, say, the Aztec Empire fell to Cortés. The Western Empire\'s institutions eroded gradually enough that contemporaries in the East, ruling from Constantinople, did not consider "Rome" to have ended at all — the Eastern Roman Empire, which we call Byzantine only in hindsight, continued for another thousand years. That alone should make us suspicious of any tidy single-cause explanation for 476.'

  id:'needham', cat:'History of Science', tint:'#c9a227', icon:'compass',
  q:'Why didn\'t China\'s early scientific lead turn into a scientific revolution?',
  teaser:'By 1400, China had printing, gunpowder, the compass, and cast iron centuries before Europe. Yet the systematic, mathematized science that reshaped the West after 1600 didn\'t take root there first. The puzzle even has a name — historians call it the Needham Question — and no answer fully satisfies.',
  title:'The Needham Question: why invention didn\'t become revolution',
  eyebrow:'History of science · long read',
  body:[
   'Joseph Needham, a British biochemist turned historian who spent much of his life cataloguing Chinese scientific and technical achievement, posed a question that has haunted historians of science since: for most of recorded history, China was more technologically advanced than Europe, often by centuries. Papermaking, the compass, gunpowder, movable-type printing, cast iron, and sophisticated astronomical instruments all appeared in China well before their European counterparts. And yet it was Europe, not China, that produced Copernicus, Galileo, Newton, and the systematic experimental method we now call modern science. Why?',
   'One influential answer points to institutions. Imperial China selected its administrative elite through the civil service examination system, which tested mastery of classical texts, Confucian philosophy, and literary composition — not mathematics or natural philosophy. Talented minds were funneled toward becoming scholar-officials, and the prestige, wealth, and security of that path drew ambition away from the kind of open-ended, often financially precarious inquiry that characterized early modern European natural philosophers.',
   'A second answer is political fragmentation, somewhat counterintuitively treated as a strength. Europe after the fall of Rome was a patchwork of competing kingdoms, city-states, and church authorities, none powerful enough to suppress an idea everywhere at once. When the Church restricted a thinker in one territory, they might find patronage in another. China, by contrast, was usually unified under a single imperial authority; a shift in official attitude toward a field of study — astronomy, for instance, which was tightly linked to the emperor\'s claimed mandate from heaven — could affect the entire empire at once, for better or worse.',
   'A third answer concerns the printing press itself, an invention China had centuries earlier than Europe. Movable type existed in China by the 11th century, yet its impact was more muted than Gutenberg\'s 15th-century press would later have in Europe. Part of the explanation is linguistic and technical: Chinese script requires thousands of distinct characters, making movable type far more cumbersome to set than an alphabet of two dozen letters, so woodblock printing remained more practical for a long time. But part of it may also be structural — China\'s scholarly culture prized textual fidelity to established classics rather than the rapid, contentious, often heretical proliferation of new and competing ideas that print fueled in Reformation-era Europe.',
   'A fourth answer, favored by economic historians like Kenneth Pomeranz, questions the premise itself. Pomeranz\'s "Great Divergence" argument suggests that as late as 1750, the most developed regions of China (the Yangzi Delta) and the most developed regions of Europe (England, the Low Countries) were not obviously different in living standards, technology, or market sophistication. What diverged sharply afterward, he argues, owed as much to Europe\'s access to New World resources and coal deposits conveniently located near industrial centers as to any deep cultural or institutional superiority.',
   'None of these answers is fully satisfying alone, which is precisely why the Needham Question remains contested rather than settled. It is tempting, and historically common, to reach for a single explanatory factor — Confucianism, political unity, geography, luck — but the honest answer is that historians disagree on the relative weight of each, and new archival and economic research continues to shift the debate. What the question does settle is the folk assumption that Europe was simply "ahead" the whole time. It wasn\'t. Something specific happened after roughly 1600, and figuring out exactly what remains one of the more genuinely open problems in global history.'

  id:'democratic-peace', cat:'Political Science', tint:'#54725a', icon:'scroll',
  q:'Why do democracies almost never go to war with each other?',
  teaser:'It is one of the closest things international relations has to a hard empirical law: modern democracies rarely fight wars against other democracies, even though they fight plenty of wars overall. The theory explaining why is compelling — and seriously contested.',
  title:'The democratic peace: a rare near-law with an unsettled explanation',
  eyebrow:'Political science · long read',
  body:[
   'Among the more striking patterns in modern international relations is this: liberal democracies fight wars fairly often, but almost never against each other. Scholars have found this pattern robust enough across the 19th and 20th centuries that some, like political scientist Jack Levy, have half-joked it comes as close to an empirical law as anything in the field. The theory built to explain it is called the democratic peace, and it has become one of the most cited — and most argued over — ideas in political science.',
   'The dominant explanation rests on two overlapping mechanisms. The institutional mechanism holds that democratic leaders are accountable to voters who bear the human and economic costs of war, and face institutional checks — legislatures, courts, free press — that make it harder to rush into conflict unilaterally. The normative mechanism holds that democracies, sharing a political culture built on negotiation, compromise, and non-violent transfer of power domestically, tend to externalize those same norms when dealing with fellow democracies, resolving disputes through diplomacy rather than force, while reserving more suspicion for non-democratic states whose intentions and internal constraints are harder to read.',
   'Both mechanisms have real empirical support, but critics have pushed back hard on several fronts. One challenge is selection bias in the historical record: the era in which we have good data on democracies — roughly since 1816 by the standard Correlates of War dataset — is also an era shaped by particular power structures, like the Cold War alliance system, where the United States actively worked to keep fellow democracies within NATO and other blocs from fighting each other. Some scholars argue this "alliance" effect, not shared democratic character itself, does much of the explanatory work.',
   'A second challenge is definitional. Political scientists disagree on thresholds for what counts as a "democracy" and what counts as a "war" in these datasets, and results have been shown to shift meaningfully depending on where those lines are drawn. Democracies with a much lower population share able to vote — Britain and the United States in the 19th century, for instance, when women and often racial minorities were excluded — are sometimes coded as full democracies in these studies, which some critics find historically questionable.',
   'A third, more pointed critique comes from realist international relations scholars, who argue the theory has the causal arrow backwards, or at least tangled: perhaps democracies simply tend to ally with other democracies for strategic reasons already, and peace follows from shared strategic interest rather than shared regime type causing the peace directly.',
   'What makes the democratic peace worth sitting with, rather than treating as settled fact or dismissed myth, is that both the empirical pattern and the disagreement over its cause are unusually well-documented for a social science claim. It has shaped real foreign policy — versions of the theory were explicitly cited in U.S. foreign policy rhetoric in the 1990s to justify democracy promotion as a peace strategy — while remaining, at its core, a correlation whose mechanism is still being argued out.'
  ],

{
  id:'entropy', cat:'Physics', tint:'#c9a227', icon:'hourglass',
  q:'Why can\'t the universe just run backward?',
  teaser:'Nearly every fundamental law of physics works the same forwards or backwards in time — except one. The second law of thermodynamics is the reason broken glass doesn\'t reassemble itself, and it hinges on a deceptively simple idea: entropy.',
  title:'Entropy, and the strange one-way street of time',
  eyebrow:'Physics · long read',
  body:[
   'Watch a video of two billiard balls colliding, and you cannot tell if it\'s playing forward or in reverse — the physics of the collision looks equally valid either way. Watch a video of an egg smashing on the floor, and you know instantly if it\'s reversed, because eggs don\'t un-smash. This asymmetry is strange, because almost every fundamental equation in physics — Newton\'s laws, Maxwell\'s equations, even the core equations of quantum mechanics — is time-symmetric. Reverse the direction of time in the math, and the equations still hold. So where does the one-way arrow of time in everyday experience come from?',
   'The answer lies in the second law of thermodynamics, which says the entropy of an isolated system never decreases over time. Entropy is often loosely described as "disorder," but a more precise and more useful definition, developed by Ludwig Boltzmann in the late 19th century, is statistical: entropy measures the number of microscopic arrangements consistent with a given macroscopic state.',
   'Consider a shattered egg versus a whole egg. There is exactly one arrangement of shell fragments and yolk that looks like an intact egg sitting neatly in its shell. There are astronomically many arrangements of the same atoms that look like "a mess on the floor." When the egg falls and breaks, it isn\'t violating any fundamental law by moving toward disorder — it is simply moving toward the vastly more probable set of configurations, the way a shuffled deck of cards is far more likely to end up in a random order than in perfect suit sequence, not because shuffling forbids the ordered outcome, but because there is only one ordered outcome among trillions of possibilities.',
   'This statistical framing explains why entropy increase feels like a law of nature even though, technically, it is a law of overwhelming probability rather than strict impossibility. It is not physically impossible for all the air molecules in a room to spontaneously rush into one corner, leaving you gasping in a vacuum on the other side. It is just so staggeringly improbable — the number of ways air can be spread evenly throughout a room dwarfs the number of ways it can be crammed into a corner — that you would need to wait vastly longer than the age of the universe to see it happen even once.',
   'This raises an important puzzle physicists still debate: if entropy always increases, and the universe has existed for about 13.8 billion years, why wasn\'t entropy already maximized long ago? The leading answer is that the universe began in an extraordinarily low-entropy state — matter distributed with unusual smoothness right after the Big Bang, held in that low-entropy condition partly by the way gravity works on cosmic scales. Physicist Roger Penrose has argued this initial low-entropy condition is itself one of the deepest unsolved puzzles in cosmology, sometimes called the "past hypothesis."',
   'The arrow of time we experience — memory pointing to the past, causes preceding effects, eggs breaking but not unbreaking — may ultimately be nothing more, and nothing less, than the universe sliding down a very long, very gradual probability slope from an improbable beginning toward a more probable, more evenly-mixed future. That we experience this slide as the flow of time itself is one of the more genuinely mind-bending implications of 19th-century statistical mechanics.'
  ],

  id:'black-death', cat:'History', tint:'#b0532c', icon:'virus',
  q:'How did a plague that killed a third of Europe help spark the Renaissance?',
  teaser:'The Black Death was an unimaginable catastrophe — yet in its aftermath, surviving peasants gained bargaining power they had never held before, feudal structures cracked, and a new, wealthier, more questioning European society began to take shape.',
  title:'Catastrophe as catalyst: the plague\'s unintended economic legacy',
  eyebrow:'History · long read',
  body:[
   'Between 1347 and 1351, the Black Death killed an estimated 30 to 60 percent of Europe\'s population, a death toll so vast that entire villages were abandoned and mass graves overwhelmed church cemeteries. It is tempting to read this only as tragedy, and it was, unambiguously, a horror for those who lived through it. But historians studying the following century have identified a set of economic and social shifts that, however unintentionally, helped set the stage for the cultural flowering we now call the Renaissance.',

let cursor = 0;
let shownCount = 0;
let online = true;
const OFFLINE_LIMIT = 6;

const feed = document.getElementById('feed');
const dotsEl = document.getElementById('dots');
const detailEl = document.getElementById('detail');
const syncPill = document.getElementById('syncPill');
const syncText = document.getElementById('syncText');

function shuffledPool(){
  const arr = [...POOL];
  for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}
let order = shuffledPool();

function nextItem(){
  if(cursor >= order.length){ order = shuffledPool(); cursor = 0; }
  const item = order[cursor]; cursor++; return item;
}

function makeCard(d){
  const card = document.createElement('div');
  card.className='card';
  card.style.setProperty('--tint', d.tint);
  card.dataset.id = d.id;
  card.innerHTML = `
    <div class="stamp"><svg viewBox="0 0 120 120">${ICONS[d.icon]}</svg><span>${d.cat}</span></div>
    <h2 class="q">${d.q}</h2>
    <p class="teaser">${d.teaser}</p>
    <div class="tap-row"><span class="line"></span><span>Tap to read the full story</span></div>
  `;
  card.addEventListener('click', ()=>openDetail(d));
  return card;
}

let sentinel = null;
let observer = null;

function setupObserver(){
  if(observer) observer.disconnect();
  observer = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting && online) loadMore(3); });
  }, { root: feed, threshold: 0.1 });
}

function addDot(){
  const dot = document.createElement('i'); dotsEl.appendChild(dot);
}

function loadMore(n){
  if(sentinel){ sentinel.remove(); sentinel = null; }
  for(let i=0;i<n;i++){
    const item = nextItem();
    feed.appendChild(makeCard(item));
    addDot();
    shownCount++;
  }
  if(online){
    sentinel = document.createElement('div');
    sentinel.style.cssText='height:1px;';
    feed.appendChild(sentinel);
    observer.observe(sentinel);
  } else if(shownCount >= OFFLINE_LIMIT){
    appendEndCard();
  }
}

function appendEndCard(){
  const end = document.createElement('div');
  end.className='end-card';
  end.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 3v12M12 3l-4 4M12 3l4 4"/><path d="M4 15v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"/></svg>
    <h3>You've reached the end of what's saved</h3>
    <p>Connect to Wi-Fi to keep exploring — new entries load automatically once you're back online.</p>`;
  feed.appendChild(end);
}

function resetFeed(){
  feed.innerHTML=''; dotsEl.innerHTML=''; cursor=0; shownCount=0; order = shuffledPool();
  setupObserver();
  loadMore(online ? 5 : OFFLINE_LIMIT);
  feed.scrollTop = 0;
  updateDots();
}

function updateDots(){
  const cards = [...feed.querySelectorAll('.card, .end-card')];
  let idx = Math.round(feed.scrollTop / feed.clientHeight);
  [...dotsEl.children].forEach((dot,i)=> dot.classList.toggle('on', i===idx));
  const active = cards[idx];
  if(active){ dotsEl.style.setProperty('--n', idx); }
}
feed.addEventListener('scroll', ()=> requestAnimationFrame(updateDots));

syncPill.addEventListener('click', ()=>{
  online = !online;
  syncPill.classList.toggle('offline', !online);
  syncText.textContent = online ? 'online · endless' : 'offline · 6 saved';
  resetFeed();
});

function openDetail(d){
  detailEl.style.setProperty('--tint', d.tint);
  const words = d.body.join(' ').split(/\s+/).length;
  const mins = Math.max(1, Math.round(words/220));
  const relatedChips = (d.related||[]).map(rid=>{
    const r = POOL.find(x=>x.id===rid);
    return r ? `<div class="chip" data-goto="${rid}">${r.q.length>46 ? r.q.slice(0,46)+'…' : r.q}</div>` : '';
  }).join('');
  detailEl.innerHTML = `
    <div class="detail-top">
      <div class="close-btn" id="closeBtn">✕</div>
      <div class="read-meta">${mins} min read</div>
    </div>
    <div class="hero"><svg viewBox="0 0 120 120">${ICONS[d.icon]}</svg></div>
    <div class="detail-body">
      <span class="detail-eyebrow">${d.eyebrow || d.cat}</span>
      <h1 class="detail-title">${d.title}</h1>
      ${d.body.map(p=>`<p>${p}</p>`).join('')}
      <div class="related-label">Related sparks</div>
      <div class="chips">${relatedChips}</div>
      <div class="offline-tag"><svg viewBox="0 0 24 24"><path d="M4 12 L10 18 L20 6"/></svg>saved for offline reading</div>
    </div>
  `;
  detailEl.classList.add('open');
  detailEl.querySelector('#closeBtn').addEventListener('click', closeDetail);
  detailEl.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      const goto = chip.dataset.goto;
      closeDetail();
      setTimeout(()=>{
        let card = feed.querySelector(`[data-id="${goto}"]`);
        if(!card){
          const item = POOL.find(x=>x.id===goto);
          card = makeCard(item);
          feed.insertBefore(card, feed.firstChild);
        }
        card.scrollIntoView({behavior:'instant', block:'start'});
      }, 430);
    });
  });
}
function closeDetail(){ detailEl.classList.remove('open'); }

setupObserver();
loadMore(5);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
</script>
